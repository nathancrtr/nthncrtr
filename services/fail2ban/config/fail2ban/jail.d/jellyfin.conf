# Jellyfin jail. Version-controlled; deploy.sh pushes this into
# /srv/fail2ban/config/fail2ban/jail.d/ and reloads fail2ban.
#
# Bans are enforced at CLOUDFLARE'S EDGE, not the host firewall: the public
# path is a Cloudflare Tunnel, so attackers hit Cloudflare and never natto
# directly (a host iptables ban would match nothing). `cloudflare-token`
# adds the offender to a Cloudflare IP Access Rule via the API. The API
# token is supplied out-of-band in action.d/cloudflare-token.local (secret,
# gitignored). See services/fail2ban/docker-compose.yml header + README.
[jellyfin]
enabled  = true
backend  = auto
filter   = jellyfin
logpath  = /remotelogs/jellyfin/*.log

# 5 failures in 10 min → 24 h ban. Generous enough not to lock out a
# friend fat-fingering a password on a TV remote; tight enough to make
# credential-stuffing pointless.
maxretry = 5
findtime = 600
bantime  = 86400

# Repeat offenders escalate (fail2ban 0.11+ persists across restarts).
bantime.increment = true
bantime.maxtime   = 1209600

# Enforce at Cloudflare. banaction must be set explicitly in a jail.d
# snippet (it does not reliably inherit from the image [DEFAULT], else the
# stock %(action_)s template fails with "interpolation key 'banaction' not
# a valid option"). cloudflare-token uses the API token from the
# auto-merged action.d/cloudflare-token.local. No chain/port/protocol —
# those are iptables-only and irrelevant to an edge ban.
banaction = cloudflare-token
