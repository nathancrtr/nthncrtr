---
# Top-level groups follow host names so the dashboard reflects the
# physical layout. Secrets are pulled from environment variables —
# see services/homepage/secrets.env.example for the full list.

- natto:
    - Pi-hole:
        href: https://pi-hole.nthncrtr.com
        icon: pi-hole.png
        server: my-docker
        container: pihole
        widget:
          type: pihole
          url: http://host.docker.internal:8053
          key: '{{HOMEPAGE_VAR_PIHOLE_KEY}}'
          version: 6

    - Navidrome:
        href: https://natto.nthncrtr.com
        icon: navidrome.png
        server: my-docker
        container: navidrome-navidrome-1
        widget:
          type: navidrome
          url: http://natto.tailaf7ea6.ts.net:4533
          user: nthncrtr
          token: '{{HOMEPAGE_VAR_NAVIDROME_TOKEN}}'
          salt: '{{HOMEPAGE_VAR_NAVIDROME_SALT}}'

    - qBittorrent:
        href: https://torrent.nthncrtr.com
        icon: qbittorrent.png
        server: my-docker
        container: qbittorrent
        widget:
          type: qbittorrent
          url: http://host.docker.internal:8080
          username: admin
          password: '{{HOMEPAGE_VAR_QBITTORRENT_PASSWORD}}'

    - Radarr:
        href: https://radarr.nthncrtr.com
        icon: radarr.png
        server: my-docker
        container: radarr
        widget:
          type: radarr
          url: http://host.docker.internal:7878
          key: '{{HOMEPAGE_VAR_RADARR_KEY}}'

    - Sonarr:
        href: https://sonarr.nthncrtr.com
        icon: sonarr.png
        server: my-docker
        container: sonarr
        widget:
          type: sonarr
          url: http://host.docker.internal:8989
          key: '{{HOMEPAGE_VAR_SONARR_KEY}}'

    - Prowlarr:
        href: https://prowlarr.nthncrtr.com
        icon: prowlarr.png
        server: my-docker
        container: prowlarr
        widget:
          type: prowlarr
          url: http://host.docker.internal:9696
          key: '{{HOMEPAGE_VAR_PROWLARR_KEY}}'

- starmaya:
    - Coffee Roasting:
        href: https://starmaya.nthncrtr.com
        icon: mdi-coffee
        widget:
          type: ping
          url: http://kvass.tailaf7ea6.ts.net:8080

