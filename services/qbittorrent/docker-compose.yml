# qBittorrent + Gluetun (Proton VPN) — managed by deploy.sh (deploy.sh qbittorrent).
#
# Architecture: gluetun establishes a Proton VPN WireGuard tunnel and exposes
# its network namespace via network_mode: service:gluetun. qbittorrent shares
# that namespace, so 100% of its traffic exits through the VPN. If gluetun
# dies, qbittorrent has no network at all (implicit kill switch). Setting
# qBit's Network Interface to tun0 in the WebUI is defense-in-depth.
#
# WebUI port 8080 is published on gluetun (not qbittorrent — it can't publish
# ports when sharing another container's netns). Caddy still routes
# torrent.nthncrtr.com → natto:8080.
#
# The torrent peer port is the *forwarded* port that Proton assigns
# dynamically — see services/qbittorrent/README.md and
# runbooks/proton-vpn-setup.md. It is not a fixed 6881.
services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "8080:8080"
    env_file:
      - path: secrets.env
        required: false
    environment:
      - TZ=America/New_York
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: "service:gluetun"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - WEBUI_PORT=8080
    volumes:
      - ./config:/config
      - /mnt/media:/mnt/media
    depends_on:
      - gluetun
    restart: unless-stopped
