# Lidarr — music collection manager. Managed by deploy.sh (sudo ./deploy.sh lidarr).
#
# *** READ-ONLY MEDIA MOUNT — this is a hard safety boundary, not a preference. ***
# On 2026-06-16 a Lidarr import (copy-into-Artist/Album, then delete original,
# with no Recycle Bin) PERMANENTLY deleted 6,780 FLACs across 509 albums.
# Recovery took a full re-download from OPS. To make a repeat IMPOSSIBLE at the
# kernel level, /mnt/media is now mounted ':ro' here — Lidarr physically cannot
# write, rename, move, or delete anything in the media tree. Do not revert this
# to a writable mount without an explicit operator decision (and even then, only
# with Recycle Bin on). See README.md § Read-only hardening and CLAUDE.md.
#
# Operating model (changed from the import-based *arr default): Lidarr is a
# monitor + search-via-Prowlarr + hand-to-qBittorrent front-end only. It does
# NOT import. qBit (its own writable mount; never the culprit) is the SOLE
# writer into /mnt/media/music — the same tree Navidrome scans — so new grabs
# still appear in Navidrome. Completed Download Handling stays OFF; with a :ro
# mount Lidarr couldn't import anyway.
#
# Before first run on natto (deploy.sh handles dirs idempotently, but for
# manual bring-up):
#   mkdir -p /srv/lidarr/config /srv/lidarr/scratch
#   docker compose -f /srv/lidarr/docker-compose.yml up -d
#   # Then in the WebUI (https://lidarr.nthncrtr.com — behind Authelia):
#   #   Settings → Media Management → Root Folder: keep /mnt/media/music. It is
#   #     mounted read-only, which Lidarr tolerates for an EXISTING root (shows a
#   #     benign "MountCheck: read-only" health error — that's the lockdown
#   #     working) and keeps Lidarr library-aware. /scratch exists only as a
#   #     writable fallback IF you ever delete and re-add the root from scratch
#   #     (Lidarr's add-time writability check rejects a :ro path). See README
#   #     § Read-only hardening.
#   #   Settings → Media Management → Recycle Bin = /scratch/recycle, and turn
#   #     OFF "Rename Tracks" + "Completed Download Handling" import (belt-and-
#   #     suspenders — these only bite if the mount is ever made writable).
#   #   Settings → Download Clients → Add qBittorrent: host gluetun, port 8080,
#   #     category `music` (Lidarr joins qbittorrent_default — see networks).
#   #   Settings → General → Security → copy the API key to secrets.env
#   # Indexers come from Prowlarr (add Lidarr as a Prowlarr Application + add
#   #   the Orpheus indexer there) — see README.md § Orpheus.
#
# Downloads: qBit's `music` category has an empty save path and auto-TMM off, so
#   Lidarr-issued grabs land in qBit's global save path; qBit (not Lidarr) puts
#   the completed files where they belong. Because Lidarr can't import, point
#   the `music` category's save path at /mnt/media/music in qBit if you want
#   grabs to land in the library directly.
#
#   (Aside: the tools/orpheus download_available.py side-channel saves OPS
#   grabs straight into /mnt/media/music under category `wishlist`; that's a
#   separate manual pipeline and does not collide with Lidarr's `music`
#   category.)
#
# mem_limit: 512m is a deliberate bound on a SHARED hub (~7 GiB Beelink, not
#   the old 2 GB Pi / SD card). Lidarr idles ~150–250 MB and is not OOM-killed
#   in practice; the cap protects the other co-resident services. See README.
#
# Ports:
#   8686 — WebUI (matches Caddyfile)
services:
  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - ./config:/config
      # READ-ONLY: the kernel-enforced guarantee that Lidarr can never again
      # delete or rewrite library files (2026-06-16 incident — see header).
      - /mnt/media:/mnt/media:ro
      # Writable scratch ONLY to satisfy Lidarr's root-folder writability check
      # (a :ro path is rejected on add). Add /scratch as the root folder in the
      # UI; no media is stored here — qBit writes the real files into
      # /mnt/media/music. See README § Read-only hardening.
      - /srv/lidarr/scratch:/scratch
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      # default = lidarr's own net (lidarr_default; Homepage joins it).
      # arrnet = shared *arr net so Prowlarr (also on arrnet) can reach Lidarr
      # by name at http://lidarr:8686.
      # qbittorrent_default = qBittorrent's compose net (created by the
      # qbittorrent stack — Lidarr attaches as external). Lets the download
      # client reach gluetun:8080 by name; the 172.23.0.0/16 subnet is
      # already in qBit's WebUI auth-bypass whitelist, so no second login.
      # The old host.docker.internal:8080 path was broken when safety rule 9
      # rebound qBit's WebUI port to 127.0.0.1 (2026-05-18).
      - default
      - arrnet
      - qbittorrent_default
    ports:
      # 127.0.0.1 only: the sole intended path is lidarr.nthncrtr.com →
      # Caddy (native on natto, so localhost) → Authelia. In the UI set
      # Authentication = Forms/Basic + Authentication Required = "Disabled for
      # Local Addresses" (current Lidarr removed the old `External` option;
      # this is its equivalent) so the loopback/proxied path renders no login
      # and trusts the proxy — a 0.0.0.0 publish would be an unauthenticated
      # LAN open door. API key still guards /api.
      - "127.0.0.1:8686:8686"
    restart: unless-stopped
    mem_limit: 512m

networks:
  default:
  # Shared *arr-stack net (Prowlarr↔*arrs). Created idempotently by deploy.sh.
  arrnet:
    external: true
  # Created by the qbittorrent compose project; Lidarr attaches as external
  # so it can reach gluetun:8080 (qBit shares gluetun's netns).
  qbittorrent_default:
    external: true
