# Cloudflare Tunnel ingress — version-controlled. Deployed to
# /srv/cloudflared/config.yml by deploy.sh.
#
# The `tunnel:` UUID below is a PLACEHOLDER. It is filled in on natto only,
# after the operator runs `cloudflared tunnel create play` (see README) —
# the UUID is per-tunnel and pairs with the gitignored credentials.json.
# deploy.sh will NOT overwrite a /srv copy whose UUID is already filled
# (it warns instead) so this placeholder never clobbers a live tunnel.
tunnel: REPLACE_WITH_TUNNEL_UUID
credentials-file: /etc/cloudflared/credentials.json

# Be conservative on the origin: cloudflared only exposes what is listed
# here. The hostnames below are the entire public surface area of natto;
# everything else returns 404. This list IS the internet-exposure
# allowlist — adding a third entry is an explicit operator decision that
# requires updating CLAUDE.md safety rule 8 in the same change. This is
# the scoping guarantee that replaces the old ":8443-only" Caddy trick.
#
#   play.nthncrtr.com     → Jellyfin (network_mode: host, :8096)
#   requests.nthncrtr.com → Seerr   (bridge, host-publish 127.0.0.1:5055)
#
# Both upstreams reach `localhost` because cloudflared runs with
# network_mode: host on natto (see docker-compose.yml).
ingress:
  - hostname: play.nthncrtr.com
    service: http://localhost:8096
  - hostname: requests.nthncrtr.com
    service: http://localhost:5055
  - service: http_status:404

# Jellyfin needs websockets + long media streams; cloudflared handles both
# by default. originRequest tuning kept minimal and explicit:
originRequest:
  connectTimeout: 30s
  noTLSVerify: false
