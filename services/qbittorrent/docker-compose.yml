# qBittorrent + Gluetun (Proton VPN) — managed by deploy.sh (deploy.sh qbittorrent).
#
# Architecture: gluetun establishes a Proton VPN WireGuard tunnel and exposes
# its network namespace via network_mode: service:gluetun. qbittorrent shares
# that namespace, so 100% of its traffic exits through the VPN. If gluetun
# dies, qbittorrent has no network at all (implicit kill switch). Setting
# qBit's Network Interface to tun0 in the WebUI is defense-in-depth.
#
# WebUI port 8080 is published on gluetun (not qbittorrent — it can't publish
# ports when sharing another container's netns). Caddy still routes
# torrent.nthncrtr.com → natto:8080.
#
# The torrent peer port is the *forwarded* port that Proton assigns
# dynamically. The qbit-port-updater sidecar watches gluetun's
# forwarded_port file and pushes the current port to qBit's WebUI API,
# so manual reconfiguration on every Gluetun reconnect isn't needed.
services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "8080:8080"
    volumes:
      # Shared with qbit-port-updater so it can read forwarded_port.
      - ./gluetun-state:/tmp/gluetun
    env_file:
      - path: secrets.env
        required: false
    environment:
      - TZ=America/New_York
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: "service:gluetun"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - WEBUI_PORT=8080
    volumes:
      - ./config:/config
      - /mnt/media:/mnt/media
    depends_on:
      - gluetun
    restart: unless-stopped

  qbit-port-updater:
    image: curlimages/curl:latest
    container_name: qbit-port-updater
    network_mode: "service:gluetun"
    volumes:
      - ./gluetun-state:/state:ro
      - ./port-updater.sh:/port-updater.sh:ro
    entrypoint: ["/bin/sh", "/port-updater.sh"]
    environment:
      - POLL_INTERVAL=60
      - TZ=America/New_York
    depends_on:
      - gluetun
      - qbittorrent
    restart: unless-stopped
