# Radarr — managed by deploy.sh (sudo ./deploy.sh radarr).
#
# Before first run on natto (deploy.sh handles dirs idempotently, but for
# manual bring-up):
#   mkdir -p /srv/radarr/config
#   mkdir -p /mnt/media/video/movies
#   docker compose -f /srv/radarr/docker-compose.yml up -d
#   # Then in the WebUI (https://radarr.nthncrtr.com):
#   #   Settings → Media Management → Add Root Folder: /mnt/media/video/movies
#   #   Settings → Download Clients → Add qBittorrent (category: movies)
#   #   Settings → General → Security → copy the API key to secrets.env
#
# Downloads: qBit's global save path is /mnt/media/_unsorted/torrents (NOT
#   the old /mnt/media/downloads/complete/ — that path does not exist). The
#   `movies` category has an empty save path and qBit auto-TMM is off, so
#   grabs land flat there; Radarr imports them into /mnt/media/video/movies/.
#   /mnt/media is exfat — no hardlinks — so "keep seeding" copies the file
#   into the library (stored twice until seeding stops). See README.md.
#
# mem_limit: 512m is a deliberate bound on a SHARED hub (~7 GiB Beelink, not
#   the old 2 GB Pi / SD card). Radarr idles ~150–250 MB and is not OOM-killed
#   in practice; the cap protects the other co-resident services. See README.
#
# Ports:
#   7878 — WebUI (matches Caddyfile)
services:
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - ./config:/config
      - /mnt/media:/mnt/media
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      # 127.0.0.1 only: the sole intended path is radarr.nthncrtr.com →
      # Caddy (native on natto, so localhost) → Authelia. config.xml has
      # AuthenticationMethod=External (runtime state, not in repo) so Radarr
      # renders no login page and trusts the proxy — a 0.0.0.0 publish would
      # be an unauthenticated LAN open door. API key still guards /api.
      - "127.0.0.1:7878:7878"
    restart: unless-stopped
    mem_limit: 512m
