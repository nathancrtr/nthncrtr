# Jellyfin failed-authentication filter. Version-controlled; deploy.sh
# pushes this into /srv/fail2ban/config/fail2ban/filter.d/ and reloads
# fail2ban.
#
# Jellyfin reworded this line between 10.8 and 10.9, so BOTH forms are
# matched. If a future Jellyfin changes it again, grep the live log for
# 'has been denied' to find the new wording before editing:
#   docker exec jellyfin sh -c "grep -h 'has been denied' /config/log/*.log | tail"
#
# <HOST> is fail2ban's host token; it requires the REAL client IP to be in
# the log line, which only happens once Jellyfin's "Known proxies" =
# 127.0.0.1 is set (see services/fail2ban/README.md — required operator
# step). Without it the line reads IP "127.0.0.1" and nothing useful bans.
[Definition]
failregex = Authentication request for ".*" has been denied \(IP: "<HOST>"\)\.?
            Authentication request for ".*" has been denied\. \(IP: <HOST>\)
            Invalid (username|password) entered\. .*RemoteEndPoint: <HOST>

ignoreregex =

# Jellyfin log prefix: [2026-05-17 12:00:00.000 -04:00] [ERR] ...
datepattern = ^\[%%Y-%%m-%%d %%H:%%M:%%S
