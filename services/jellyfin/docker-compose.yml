# Jellyfin — local media server for the video library. Managed by deploy.sh
# (sudo ./deploy.sh jellyfin).
#
# Reachability: the ONE deliberately internet-exposed service (trusted users,
# per-user accounts — operator decision, WORKLIST 6.6). Reached at:
#   https://play.nthncrtr.com:8443          (public AND inside, single URL)
#   http://natto:8096                       (LAN, raw — still works)
#   http://natto.tailaf7ea6.ts.net:8096     (tailnet, raw — still works)
# Why the :8443 in the URL — this is a hard-won lesson, do not "simplify"
# it back to :443: the GFiber router RESERVES inbound WAN 443 for its own
# management UI (it answers :443 with a self-signed cert and never forwards
# it), so the public entrypoint is WAN 8443 → natto:8443. Caddy already
# serves play.nthncrtr.com on :8443 with a valid Let's Encrypt cert.
# PublishedServerUrl must therefore carry :8443 so the SAME value works
# inside (Pi-hole split-horizon → natto LAN IP, Caddy :8443) and outside
# (GFiber forward WAN 8443 → natto :8443). NO Authelia on this route
# (forward_auth breaks native TV/phone clients — WORKLIST 6.4/6.6);
# Jellyfin's own accounts + the fail2ban jail (services/fail2ban) are the
# only barrier. Caddy is :8443-scoped so ONLY Jellyfin is public; every
# other vhost stays tailnet-only on :443. 8096 is Jellyfin's default HTTP
# port, free on natto (8080 = gluetun, 8081 = nextcloud, 8053 = pihole
# admin, 8443 = the Jellyfin public listener in Caddy).
#
# Data layout on natto (config/cache on the Beelink's internal ext4 — the
# media itself stays on the exfat 5TB, mounted read-only):
#   /srv/jellyfin/config  → server config + library DB + metadata
#   /srv/jellyfin/cache   → transcode + image cache
#   /mnt/media/video      → the library (movies/ + tv/), bind-mounted :ro
# config/cache are NOT on the exfat 5TB: Jellyfin's SQLite library DB needs
# POSIX locking/atomic renames exfat can't give (same reasoning as Nextcloud,
# see services/nextcloud/README.md).
#
# Hardware transcoding: the Beelink S12's Intel iGPU is passed through via
# /dev/dri (QuickSync). group_add carries natto's `render` (gid 991) and
# `video` (gid 44) gids so the in-container user can open renderD128 — these
# are HOST gids and must match `getent group render video` on natto. Enable
# QSV under Dashboard → Playback after first start.
#
# Conventions match the *arrs (radarr/sonarr): lscr.io/linuxserver image,
# PUID/PGID 1000 (owns /mnt/media), TZ. No mem_limit — natto is the Beelink
# now (the Pi-era 512m caps on radarr/sonarr are stale), and transcoding is
# memory-hungry by design.
#
# Networking: host mode (NOT bridge + published ports). Why this matters and
# is not optional here:
#   - Caddy is native on natto and reverse-proxies to 127.0.0.1:8096. Under
#     bridge+published-ports, the in-container source of that hop is the
#     Docker bridge gateway — an RFC1918 address that also CHANGES whenever
#     the compose network is recreated. Jellyfin's 10.9+ DNS-rebinding guard
#     then sees "RFC1918 client → public Host (play.nthncrtr.com)" and
#     returns `Forbidden: Rejected request from RFC1918 IP to public server
#     address`. Host mode makes Jellyfin see the proxy as 127.0.0.1
#     (loopback, inherently trusted) so the guard never fires.
#   - 127.0.0.1 is then the correct, STABLE value for Jellyfin Dashboard →
#     Networking → "Known proxies" — which is exactly what services/fail2ban
#     already documents (that instruction was wrong under bridge mode).
#   - This is also Jellyfin's own recommended mode behind a same-host proxy.
# Host mode binds 8096 (+ 8920, 1900/udp DLNA, 7359/udp discovery) directly
# on natto's interfaces — same LAN/tailnet reach as the old published 8096,
# and still NOT public (only Caddy's :8443 is router-forwarded). `ports:` is
# intentionally absent: it is invalid/ignored with network_mode host.
services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      # Absolute base URL handed to clients. One value works inside AND out:
      # inside, Pi-hole split-horizon resolves the name to natto's LAN IP;
      # outside, Cloudflare resolves it to the home WAN IP — both reach
      # Caddy's play.nthncrtr.com:8443 listener. The :8443 is MANDATORY in
      # this value (GFiber reserves WAN 443; see the header). Dropping the
      # port breaks external clients.
      - JELLYFIN_PublishedServerUrl=https://play.nthncrtr.com:8443
    volumes:
      - ./config:/config
      - ./cache:/cache
      - /mnt/media/video:/media/video:ro
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "991"   # render (natto: getent group render)
      - "44"    # video  (natto: getent group video)
    network_mode: host
    restart: unless-stopped
