# qBittorrent + Gluetun (Proton VPN) — managed by deploy.sh (deploy.sh qbittorrent).
#
# Architecture: gluetun establishes a Proton VPN WireGuard tunnel and exposes
# its network namespace via network_mode: service:gluetun. qbittorrent shares
# that namespace, so 100% of its traffic exits through the VPN. If gluetun
# dies, qbittorrent has no network at all (implicit kill switch). Setting
# qBit's Network Interface to tun0 in the WebUI is defense-in-depth.
#
# WebUI port 8080 is published on gluetun (not qbittorrent — it can't publish
# ports when sharing another container's netns), bound to 127.0.0.1 only so
# the sole path is torrent.nthncrtr.com → Caddy (native on natto, localhost)
# → Authelia. qBit has no "External/trust-proxy" mode like the *arrs, so to
# kill the second login it whitelists the docker bridge in WebUI auth
# (WebUI\AuthSubnetWhitelist, runtime state in qBittorrent.conf — not in
# repo); binding 8080 to localhost is what keeps that whitelist from being a
# LAN-direct bypass. The in-netns 127.0.0.1:8080 path (gluetun port-forward
# command + qbit-port-updater) is unaffected — that's localhost, not this
# publish.
#
# The torrent peer port is the *forwarded* port that Proton assigns
# dynamically. The qbit-port-updater sidecar watches gluetun's
# forwarded_port file and pushes the current port to qBit's WebUI API,
# so manual reconfiguration on every Gluetun reconnect isn't needed.
services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      # Shared with qbit-port-updater so it can read forwarded_port.
      - ./gluetun-state:/tmp/gluetun
    env_file:
      - path: secrets.env
        required: false
    environment:
      - TZ=America/New_York
      # gluetun blocks ALL inbound by default. The 127.0.0.1:8080 host publish
      # works because that path is host→DNAT→conntrack; a *fresh* container-to-
      # container connect to gluetun:8080 (the Homepage widget on the shared
      # qbittorrent_default net) is rejected without this. Opens 8080 on
      # gluetun's docker-net interface only (172.23.0.0/16 — already in qBit's
      # WebUI\AuthSubnetWhitelist); the tun0 VPN side and the 127.0.0.1-only
      # host publish (safety rule 9) are unchanged. Standard gluetun+sidecar
      # pattern — see services/homepage/README.md "two paths".
      - FIREWALL_INPUT_PORTS=8080
      # Instant push-on-change: the moment Proton assigns a new forwarded
      # port, gluetun runs this in its own netns (so 127.0.0.1:8080 is qBit,
      # localhost auth-bypass applies). Eliminates the up-to-60s dead-inbound
      # window the qbit-port-updater poll would otherwise leave after a VPN
      # reconnect — brutal on private-tracker torrents (no DHT/PEX fallback).
      # The sidecar stays as a backstop for the qBit-restarted case.
      - |
        VPN_PORT_FORWARDING_UP_COMMAND=/bin/sh -c 'wget -qO- --post-data="json={\"listen_port\":{{PORTS}},\"upnp\":false,\"random_port\":false}" http://127.0.0.1:8080/api/v2/app/setPreferences'
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: "service:gluetun"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - WEBUI_PORT=8080
    volumes:
      - ./config:/config
      - /mnt/media:/mnt/media
      # Incomplete-downloads staging on the SATA SSD (root fs), separate from
      # /mnt/media which is a USB-attached spinning HDD on exfat. qBit writes
      # in-progress pieces here (small random writes + fsyncs, the access
      # pattern exfat-on-USB-HDD is worst at) and moves the completed file to
      # /mnt/media on finish. Lifts the disk-write ceiling from ~10 MB/s
      # (USB HDD limit) to SATA SSD speed (~500 MB/s), letting the Proton WG
      # tunnel's ~77 MB/s single-flow throughput actually land. The
      # corresponding qBit pref is temp_path_enabled=true, temp_path=/incomplete
      # (runtime state in /config/qBittorrent/qBittorrent.conf, not in repo).
      # /srv has ~90 GB free, so concurrent in-progress downloads are capped
      # there until the planned NVMe upgrade to the empty M.2 slot.
      - /srv/qbit-incomplete:/incomplete
    depends_on:
      - gluetun
    restart: unless-stopped

  qbit-port-updater:
    image: curlimages/curl:latest
    container_name: qbit-port-updater
    network_mode: "service:gluetun"
    volumes:
      - ./gluetun-state:/state:ro
      - ./port-updater.sh:/port-updater.sh:ro
    entrypoint: ["/bin/sh", "/port-updater.sh"]
    environment:
      - POLL_INTERVAL=60
      - TZ=America/New_York
    depends_on:
      - gluetun
      - qbittorrent
    restart: unless-stopped
