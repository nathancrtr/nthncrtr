# Jellyfin jail. Version-controlled; deploy.sh pushes this into
# /srv/fail2ban/config/fail2ban/jail.d/ and reloads fail2ban.
#
# Bans go in the host INPUT chain because the public attack path is
# WAN 443 → router → natto:8443 → native Caddy (host process), NOT a
# Docker-published port — so INPUT drops the attacker before Caddy. See
# services/fail2ban/docker-compose.yml header for the full reasoning.
[jellyfin]
enabled  = true
backend  = auto
filter   = jellyfin
logpath  = /remotelogs/jellyfin/*.log

# 5 failures in 10 min → 24 h ban. Generous enough not to lock out a
# friend fat-fingering a password on a TV remote; tight enough to make
# credential-stuffing pointless.
maxretry = 5
findtime = 600
bantime  = 86400

# Repeat offenders escalate (fail2ban 0.11+ persists across restarts).
bantime.increment = true
bantime.maxtime   = 1209600

# banaction MUST be set explicitly here. A jail.d snippet does not reliably
# inherit `banaction` from the image's [DEFAULT], so the stock `%(action_)s`
# template fails with "interpolation key 'banaction' not a valid option".
# iptables-allports matches the linuxserver image default and works on the
# host INPUT chain (host network + NET_ADMIN).
banaction = iptables-allports
chain     = INPUT
port      = http,https,8443,8096
protocol  = tcp
