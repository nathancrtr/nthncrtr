---
# Top-level groups follow host names so the dashboard reflects the
# physical layout. Secrets are pulled from environment variables —
# see services/homepage/secrets.env.example for the full list.

- natto:
    - Pi-hole:
        href: https://pi-hole.nthncrtr.com
        icon: pi-hole.png
        server: my-docker
        container: pihole
        widget:
          type: pihole
          url: http://host.docker.internal:8053
          # Pi-hole runs passwordless (pihole.toml pwhash empty), so the v6
          # API needs no auth and the widget takes no key. Setting a stale
          # key here is what produced "API Error: Unexpected error".
          version: 6

    - Navidrome:
        href: https://music.nthncrtr.com
        icon: navidrome.png
        server: my-docker
        container: navidrome-navidrome-1
        widget:
          type: navidrome
          url: http://host.docker.internal:4533
          user: nthncrtr
          token: '{{HOMEPAGE_VAR_NAVIDROME_TOKEN}}'
          salt: '{{HOMEPAGE_VAR_NAVIDROME_SALT}}'

    - qBittorrent:
        href: https://torrent.nthncrtr.com
        icon: qbittorrent.png
        server: my-docker
        container: qbittorrent
        widget:
          type: qbittorrent
          # qBit shares gluetun's netns (network_mode: service:gluetun), so on
          # the qbittorrent_default net the reachable name is `gluetun`, not
          # `qbittorrent`. 8080 is qBit's WebUI inside that netns. host.docker
          # .internal won't work — gluetun publishes 8080 on 127.0.0.1 only.
          url: http://gluetun:8080
          username: admin
          password: '{{HOMEPAGE_VAR_QBITTORRENT_PASSWORD}}'

    - Radarr:
        href: https://radarr.nthncrtr.com
        icon: radarr.png
        server: my-docker
        container: radarr
        widget:
          type: radarr
          # Container name on the shared radarr_default net (radarr publishes
          # 7878 on 127.0.0.1 only — host.docker.internal can't reach it).
          url: http://radarr:7878
          key: '{{HOMEPAGE_VAR_RADARR_KEY}}'

    - Sonarr:
        href: https://sonarr.nthncrtr.com
        icon: sonarr.png
        server: my-docker
        container: sonarr
        widget:
          type: sonarr
          # Container name on the shared sonarr_default net (127.0.0.1-only
          # publish — see the Radarr note above).
          url: http://sonarr:8989
          key: '{{HOMEPAGE_VAR_SONARR_KEY}}'

    - Prowlarr:
        href: https://prowlarr.nthncrtr.com
        icon: prowlarr.png
        server: my-docker
        container: prowlarr
        widget:
          type: prowlarr
          # Container name on the shared prowlarr_default net (127.0.0.1-only
          # publish — see the Radarr note above).
          url: http://prowlarr:9696
          key: '{{HOMEPAGE_VAR_PROWLARR_KEY}}'

    - Nextcloud:
        # Tailscale-only (no Caddy route). href = tailnet URL (resolves in
        # the user's browser on the tailnet); widget url = host.docker.internal
        # because the homepage container's resolver can't see MagicDNS names
        # (same reason the Caddyfile pins IPs). `host.docker.internal` is in
        # NEXTCLOUD_TRUSTED_DOMAINS so the serverinfo Host header passes.
        href: http://natto.tailaf7ea6.ts.net:8081
        icon: nextcloud.png
        server: my-docker
        container: nextcloud
        widget:
          type: nextcloud
          url: http://host.docker.internal:8081
          username: nthncrtr
          password: '{{HOMEPAGE_VAR_NEXTCLOUD_PASSWORD}}'

    - Jellyfin:
        # Tailscale-only (no Caddy route). href = tailnet URL (browser-side);
        # widget url = host.docker.internal (homepage container can't resolve
        # MagicDNS names — see the Nextcloud note above).
        href: http://natto.tailaf7ea6.ts.net:8096
        icon: jellyfin.png
        server: my-docker
        container: jellyfin
        widget:
          type: jellyfin
          url: http://host.docker.internal:8096
          key: '{{HOMEPAGE_VAR_JELLYFIN_KEY}}'
          enableBlocks: true

    - Immich:
        # Tailnet-only. href = the Caddy URL (resolves to natto's Tailscale
        # IP — works in the browser on the tailnet, NOT internet-exposed);
        # widget url = host.docker.internal because the homepage container
        # can't resolve MagicDNS names and Immich publishes on 0.0.0.0:2283
        # (same pattern as the Nextcloud/Jellyfin widgets above).
        href: https://photos.nthncrtr.com
        icon: immich.png
        server: my-docker
        container: immich_server
        widget:
          type: immich
          url: http://host.docker.internal:2283
          key: '{{HOMEPAGE_VAR_IMMICH_KEY}}'
          version: 2

    - Memos:
        # Tailnet-only. href = the Caddy URL (resolves to natto's Tailscale
        # IP — works in the browser on the tailnet, NOT internet-exposed) and
        # is the one-click "add a note" path (Homepage can't host a text box).
        # widget url = host.docker.internal because the homepage container
        # can't resolve MagicDNS names and Memos publishes on 0.0.0.0:5230
        # (same pattern as the Nextcloud/Jellyfin/Immich widgets above).
        # No native widget type for Memos — customapi lists recent notes from
        # the v0.29 REST API. If a Memos upgrade blanks the tile, re-check the
        # /api/v1/memos response shape (services/memos/README.md § caveat).
        href: https://notes.nthncrtr.com
        icon: memos.png
        server: my-docker
        container: memos
        widget:
          type: customapi
          url: http://host.docker.internal:5230/api/v1/memos
          method: GET
          headers:
            Authorization: 'Bearer {{HOMEPAGE_VAR_MEMOS_TOKEN}}'
          display: dynamic-list
          mappings:
            items: memos
            name: content
            label: displayTime
            limit: 5
            format: date

- starmaya:
    - Coffee Roasting:
        href: https://starmaya.nthncrtr.com
        icon: mdi-coffee
        widget:
          type: ping
          url: http://kvass.tailaf7ea6.ts.net:8080
