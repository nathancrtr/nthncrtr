services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    ports:
      - "127.0.0.1:3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Read-only so the resources widget can statvfs the 5TB media drive.
      - /mnt/media:/mnt/media:ro
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=home.nthncrtr.com
    env_file:
      # secrets.env is NOT in the repo — see services/homepage/secrets.env.example
      # for the variable list. On natto: /srv/homepage/secrets.env, mode 0600.
      # Marked optional so `docker compose config` works on workhorse where the
      # file is intentionally absent.
      - path: secrets.env
        required: false
    restart: unless-stopped
