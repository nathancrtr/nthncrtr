# Jellyfin — local media server for the video library. Managed by deploy.sh
# (sudo ./deploy.sh jellyfin).
#
# Reachability: the ONE internet-exposed service (operator decision,
# WORKLIST 6.6). One clean URL, no port, works in + out:
#   https://play.nthncrtr.com               (public AND inside, single URL)
#   http://natto:8096                       (LAN, raw — still works)
#   http://natto.tailaf7ea6.ts.net:8096     (tailnet, raw — still works)
# Public path is a Cloudflare Tunnel (services/cloudflared): cloudflared
# dials OUT and maps play.nthncrtr.com → this Jellyfin (localhost:8096).
# GFiber cannot port-forward (reserved 443 / phantom-device / DMZ=all —
# full saga in README), so the router is bypassed entirely. Inside clients
# do NOT round-trip through Cloudflare: Pi-hole split-horizon points
# play.nthncrtr.com at natto's LAN IP → Caddy :443 → here. One
# PublishedServerUrl (no port) is correct for both paths. NO Authelia
# (forward_auth breaks native TV/phone clients — WORKLIST 6.4/6.6);
# per-user accounts + a Cloudflare WAF Rate-Limiting rule on the login
# path (dashboard, not in repo — WORKLIST 6.6) are the gate. The tunnel
# exposes ONLY this hostname → Jellyfin; nothing
# else on natto is reachable from the internet. 8096 is Jellyfin's default
# HTTP port, free on natto (8080 = gluetun, 8081 = nextcloud, 8053 =
# pihole admin).
#
# Data layout on natto (config/cache on the Beelink's internal SSD — the
# media itself stays on the 5TB drive, mounted read-only):
#   /srv/jellyfin/config  → server config + library DB + metadata
#   /srv/jellyfin/cache   → transcode + image cache
#   /mnt/media/video      → the video library (movies/ + tv/), bind-mounted :ro
#   /mnt/media/music      → the music library (also served by Navidrome —
#                           Jellyfin is here for the webOS/TV app ecosystem;
#                           Navidrome stays canonical for Subsonic clients.
#                           Jellyfin can ALSO scrobble to Last.fm via a plugin
#                           (closes the TV-app gap — README § Last.fm
#                           scrobbling; runtime/dashboard state, not in repo),
#                           bind-mounted :ro
# config/cache live on /srv (the SSD service-state tier), not the bulk 5TB —
# repo-wide storage split, see runbooks/media-layout.md § "Storage model".
#
# Hardware transcoding: the Beelink S12's Intel iGPU is passed through via
# /dev/dri (QuickSync). group_add carries natto's `render` (gid 991) and
# `video` (gid 44) gids so the in-container user can open renderD128 — these
# are HOST gids and must match `getent group render video` on natto. Enable
# QSV under Dashboard → Playback after first start.
#
# Conventions match the *arrs (radarr/sonarr): lscr.io/linuxserver image,
# PUID/PGID 1000 (owns /mnt/media), TZ. No mem_limit — natto is the Beelink
# now (the Pi-era 512m caps on radarr/sonarr are stale), and transcoding is
# memory-hungry by design.
#
# Networking: host mode (NOT bridge + published ports). Why this matters and
# is not optional here:
#   - Caddy is native on natto and reverse-proxies to 127.0.0.1:8096. Under
#     bridge+published-ports, the in-container source of that hop is the
#     Docker bridge gateway — an RFC1918 address that also CHANGES whenever
#     the compose network is recreated. Jellyfin's 10.9+ DNS-rebinding guard
#     then sees "RFC1918 client → public Host (play.nthncrtr.com)" and
#     returns `Forbidden: Rejected request from RFC1918 IP to public server
#     address`. Host mode makes Jellyfin see the proxy as 127.0.0.1
#     (loopback, inherently trusted) so the guard never fires.
#   - 127.0.0.1 is then the correct, STABLE value for Jellyfin Dashboard →
#     Networking → "Known proxies" (cloudflared connects from localhost) —
#     correct proxied-client behaviour + real client IPs in Jellyfin's log.
#   - This is also Jellyfin's own recommended mode behind a same-host proxy.
# Host mode binds 8096 (+ 8920, 1900/udp DLNA, 7359/udp discovery) directly
# on natto's interfaces — same LAN/tailnet reach as the old published 8096,
# and still NOT public (only Caddy's :8443 is router-forwarded). `ports:` is
# intentionally absent: it is invalid/ignored with network_mode host.
services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      # Intel OpenCL runtime for OpenCL HDR tone-mapping. Why this is needed
      # and why NOT the iGPU-native VPP tone-mapping: VPP (QSV) tone-mapping
      # silently DROPS the tonemap step when it has to compose with subtitle
      # burn-in (overlay_qsv). The generated filter graph just *relabels*
      # BT.2020/PQ as BT.709 (setparams, no real conversion), so HDR content
      # shows washed-out/wrong colors the instant a PGS (image) subtitle is
      # turned on — it forces a burn-in transcode (diagnosed 2026-05-31 on a
      # 4K HDR remux). OpenCL tone-mapping composes correctly with the overlay,
      # so burned-in output is correct SDR. The lscr image ships only an
      # (unusable, no NVIDIA GPU here) nvidia.icd and NO Intel ICD, so the
      # Intel runtime must be installed at container start via the universal
      # mod. Pairs with encoding.xml EnableTonemapping=true /
      # EnableVppTonemapping=false (runtime config, not in repo — README).
      - DOCKER_MODS=linuxserver/mods:universal-package-install
      - INSTALL_PACKAGES=intel-opencl-icd
      # Absolute base URL handed to clients. One clean value, no port,
      # works both ways: inside, Pi-hole split-horizon → natto LAN IP →
      # Caddy :443 → here; outside, Cloudflare Tunnel → here. See header.
      - JELLYFIN_PublishedServerUrl=https://play.nthncrtr.com
    volumes:
      - ./config:/config
      - ./cache:/cache
      - /mnt/media/video:/media/video:ro
      - /mnt/media/music:/media/music:ro
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "991"   # render (natto: getent group render)
      - "44"    # video  (natto: getent group video)
    network_mode: host
    restart: unless-stopped
