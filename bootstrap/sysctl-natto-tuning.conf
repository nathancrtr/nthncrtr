# /etc/sysctl.d/90-natto-tuning.conf — installed by bootstrap/natto.sh
#
# Reduces memory-pressure-driven swap thrashing on natto, which was the root
# cause of chronic 39-55% iowait and intermittent kernel exfat_write_failed
# events on /mnt/media (diagnosed 2026-05-20). Mechanism: under default
# swappiness, the kernel actively pages out container working sets (Immich
# 435 MB, Jellyfin 302 MB, mariadbd 138 MB observed) even with multi-GB
# buff/cache available — then when those pages are touched again, swap-in
# from disk competes with qBit and Radarr for the USB HDD's already-tight
# I/O budget. Worse: under burst memory pressure, folio_alloc_buffers fails
# during exfat writeback, causing exfat to enter its truncate-and-recover
# error path mid-write (visible in `journalctl -k` as the
# exfat_write_failed → __exfat_truncate stack trace).
#
# These tunables are sized for 8 GB RAM. Revisit (relax swappiness, raise
# dirty_ratio ceilings) after the planned RAM upgrade to 16 GB.

# Default 60: kernel happily swaps out app pages to keep file cache full.
# With containerized workloads whose working set is bursty (Immich worker,
# Jellyfin transcode, Postgres), this triggers a swap-in/out cycle that
# burns disk bandwidth continuously. 10 = "prefer to drop file cache; only
# swap when memory is genuinely under pressure."
vm.swappiness=10

# Default 100: kernel reclaims inode/dentry cache at the same rate as page
# cache. /mnt/media has ~775 torrent files plus the music library;
# rebuilding those dentry/inode entries every time they get evicted is
# expensive on exfat (no journal, USB-attached spinning platters). 50 =
# "hold onto fs metadata cache twice as long as file content cache."
vm.vfs_cache_pressure=50

# Default 20% / 10%: on an 8 GB host, that's 1.6 GB / 800 MB of dirty pages
# allowed before forced / background writeback. Draining 1.6 GB to a 10
# MB/s USB HDD takes ~160 seconds — during which any process that hits the
# blocking writeback threshold stalls until the disk catches up. Tighter
# ratios cap dirty-page bursts at ~400 MB / 800 MB, so flushes happen more
# often but with bounded latency tails.
vm.dirty_background_ratio=5
vm.dirty_ratio=10
