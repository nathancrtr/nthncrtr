# Prowlarr — managed by deploy.sh (sudo ./deploy.sh prowlarr).
#
# Prowlarr is an indexer manager for the *arr stack. It exposes a Torznab API
# to Sonarr and Radarr so they can search private trackers (like beyond-hd.me)
# without each app needing its own per-tracker integration.
#
# Before first run on natto (deploy.sh handles dirs idempotently, but for
# manual bring-up):
#   mkdir -p /srv/prowlarr/config
#   docker compose -f /srv/prowlarr/docker-compose.yml up -d
#   # Then in the WebUI (https://prowlarr.nthncrtr.com):
#   #   Settings → General → Security → copy the API key to secrets.env
#   #   Indexers → Add Indexer → search for "beyond-hd" (built-in definition)
#   #   Apps → Add Application → Sonarr / Radarr (sync indexers automatically)
#
# TAG-SYNC GOTCHA (cost a debugging session 2026-05-16): an Application with
# Tags set syncs ONLY indexers sharing at least one tag; an Application with
# NO tags syncs ALL indexers. If the Radarr/Sonarr apps carry tags (e.g.
# movies/tv) but the indexers are untagged, Prowlarr SILENTLY syncs nothing —
# "Application Indexer Sync" still reports completed, and Sonarr/Radarr just
# show zero indexers. For this single-user instance the apps are kept
# tag-less (sync everything). Only add app tags if you also tag the matching
# indexers. Diagnose via /srv/prowlarr/config/logs/prowlarr.debug.txt:
# "does not have any intersecting (matching) tags with <indexer>".
#
# Pi 4 B note: Prowlarr's .NET runtime is lighter than Sonarr/Radarr (~50–100 MB
# idle). mem_limit: 256m is conservative but sufficient.
#
# Ports:
#   9696 — WebUI (matches Caddyfile)
services:
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - ./config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      # 127.0.0.1 only: the sole intended path is prowlarr.nthncrtr.com →
      # Caddy (native on natto, so localhost) → Authelia. config.xml has
      # AuthenticationMethod=External (runtime state, not in repo) so Prowlarr
      # renders no login page and trusts the proxy — a 0.0.0.0 publish would
      # be an unauthenticated LAN open door. API key still guards /api.
      - "127.0.0.1:9696:9696"
    restart: unless-stopped
    mem_limit: 256m
