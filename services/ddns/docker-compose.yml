# cloudflare-ddns — keeps the jellyfin.nthncrtr.com A record pointed at this
# home's current WAN IP. Managed by deploy.sh (sudo ./deploy.sh ddns).
#
# WHY THIS EXISTS: jellyfin.nthncrtr.com is the one public service (router
# port-forward, WORKLIST 6.6). Its A record must track the home's WAN IP,
# which a residential ISP rotates without notice. When it rotates and this
# is not running, external Jellyfin access silently dies (inside access is
# unaffected — that path is Pi-hole split-horizon, not Cloudflare). Every
# OTHER *.nthncrtr.com record is Tailscale-IP and is NOT touched by this.
#
# Image: favonia/cloudflare-ddns — single static binary, distroless, runs
# unprivileged and read-only. It detects the public IP via Cloudflare's
# 1.1.1.1 trace endpoint (no router/UPnP probing) and PATCHes only the
# records named in DOMAINS. PROXIED=false is mandatory: Cloudflare's proxy
# only fronts standard ports (our public port is the non-standard :8443 via
# the router remap) and its TOS restricts proxied video streaming — we want
# a plain grey-cloud A record and our own Caddy TLS.
#
# Secret: CLOUDFLARE_API_TOKEN in /srv/ddns/secrets.env (mode 0600). Scope
# the token narrowly — Zone:DNS:Edit on the nthncrtr.com zone ONLY. See
# services/ddns/README.md. env_file required:false so `docker compose
# config` still works on workhorse where the secret is intentionally absent.
services:
  cloudflare-ddns:
    image: favonia/cloudflare-ddns:latest
    container_name: cloudflare-ddns
    # Hardening per the image's own recommendations: no root, no caps, no
    # writable fs, no privilege escalation. It needs none of them.
    user: "1000:1000"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      # Exactly one name — do NOT widen this to a wildcard; only Jellyfin is
      # public and only its record should ever be rewritten by automation.
      - DOMAINS=jellyfin.nthncrtr.com
      - PROXIED=false
      - IP6_PROVIDER=none          # IPv4-only home; no AAAA churn
      - UPDATE_CRON=@every 5m
      - DELETE_ON_STOP=false       # leave the record in place on shutdown
    env_file:
      - path: secrets.env
        required: false
    restart: unless-stopped
