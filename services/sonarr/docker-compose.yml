# Sonarr — managed by deploy.sh (sudo ./deploy.sh sonarr).
#
# Before first run on natto (deploy.sh handles dirs idempotently, but for
# manual bring-up):
#   mkdir -p /srv/sonarr/config
#   mkdir -p /mnt/media/video/tv
#   docker compose -f /srv/sonarr/docker-compose.yml up -d
#   # Then in the WebUI (https://sonarr.nthncrtr.com):
#   #   Settings → Media Management → Add Root Folder: /mnt/media/video/tv
#   #   Settings → Download Clients → Add qBittorrent (category: tv)
#   #   Settings → General → Security → copy the API key to secrets.env
#
# Downloads: qBit's global save path is /mnt/media/_unsorted/torrents (NOT
#   the old /mnt/media/downloads/complete/ — that path does not exist). The
#   `tv` category has an empty save path and qBit auto-TMM is off, so grabs
#   land flat there; Sonarr imports them into /mnt/media/video/tv/.
#   /mnt/media is ext4, so "keep seeding" hardlinks the file into the
#   library (one inode, one copy on disk — not stored twice). See README.md.
#
# mem_limit: 512m is a deliberate bound on a SHARED hub (~7 GiB Beelink, not
#   the old 2 GB Pi / SD card). Sonarr idles ~150–250 MB and is not OOM-killed
#   in practice; the cap protects the other co-resident services. See README.
#
# Ports:
#   8989 — WebUI (matches Caddyfile)
services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - ./config:/config
      - /mnt/media:/mnt/media
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      # default = sonarr's own net (sonarr_default; Homepage joins it).
      # arrnet = shared *arr net so Prowlarr (also on arrnet) can reach Sonarr
      # by name at http://sonarr:8989.
      # qbittorrent_default = qBittorrent's compose net (created by the
      # qbittorrent stack — Sonarr attaches as external). Lets the download
      # client reach gluetun:8080 by name; the 172.23.0.0/16 subnet is
      # already in qBit's WebUI auth-bypass whitelist, so no second login.
      # The old host.docker.internal:8080 path was broken when safety rule 9
      # rebound qBit's WebUI port to 127.0.0.1 (2026-05-18).
      - default
      - arrnet
      - qbittorrent_default
    ports:
      # 127.0.0.1 only: the sole intended path is sonarr.nthncrtr.com →
      # Caddy (native on natto, so localhost) → Authelia. config.xml has
      # AuthenticationMethod=External (runtime state, not in repo) so Sonarr
      # renders no login page and trusts the proxy — a 0.0.0.0 publish would
      # be an unauthenticated LAN open door. API key still guards /api.
      - "127.0.0.1:8989:8989"
    restart: unless-stopped
    mem_limit: 512m

networks:
  default:
  # Shared *arr-stack net (Prowlarr↔*arrs). Created idempotently by deploy.sh.
  arrnet:
    external: true
  # Created by the qbittorrent compose project; Sonarr attaches as external
  # so it can reach gluetun:8080 (qBit shares gluetun's netns).
  qbittorrent_default:
    external: true
